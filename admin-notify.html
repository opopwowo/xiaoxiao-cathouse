<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>新貓咪到院通知 - 管理後台</title>
<style>
  body { font-family: 'Noto Serif TC', 'PingFang TC', sans-serif; background: #FAF6F0; color: #2D2D2D; max-width: 480px; margin: 40px auto; padding: 0 20px; }
  h1 { font-size: 1.3rem; margin-bottom: 20px; }
  label { display: block; margin: 16px 0 6px; font-size: 0.9rem; color: #5A4F45; }
  input, textarea { width: 100%; padding: 10px 12px; border: 1px solid #E8E0D5; border-radius: 8px; font-size: 0.95rem; box-sizing: border-box; font-family: inherit; }
  textarea { resize: vertical; min-height: 70px; }
  button { margin-top: 24px; width: 100%; padding: 12px; background: #c8956c; color: #fff; border: none; border-radius: 999px; font-size: 1rem; cursor: pointer; }
  button:disabled { opacity: 0.6; cursor: not-allowed; }
  #result { margin-top: 18px; padding: 12px 16px; border-radius: 8px; font-size: 0.9rem; display: none; }
  #result.ok { background: #E8F5E9; color: #2E7D32; display: block; }
  #result.err { background: #FDECEA; color: #C62828; display: block; }
  .hint { font-size: 0.8rem; color: #999; margin-top: 6px; }
</style>
</head>
<body>
  <h1>🔔 新貓咪到院通知 — 推播發送</h1>

  <label for="adminKey">管理金鑰</label>
  <input type="password" id="adminKey" placeholder="貼上您的 PUSH_ADMIN_KEY">
  <div class="hint">會儲存在這個瀏覽器裡，下次不用再輸入</div>

  <label for="title">通知標題</label>
  <input type="text" id="title" value="小小貓屋 新貓咪到院了！" maxlength="60">

  <label for="body">通知內容</label>
  <textarea id="body" maxlength="150">快來看看最新到院的毛孩子，數量有限，把握機會！</textarea>

  <label for="url">點擊後開啟的網址</label>
  <input type="text" id="url" value="/">
  <div class="hint">例如某隻貓的頁面：/kitten/k39，留空則開啟首頁</div>

  <button id="sendBtn">發送推播通知</button>

  <div id="result"></div>

  <script>
    const adminKeyInput = document.getElementById('adminKey');
    const savedKey = localStorage.getItem('pushAdminKey');
    if (savedKey) adminKeyInput.value = savedKey;

    document.getElementById('sendBtn').addEventListener('click', async () => {
      const btn = document.getElementById('sendBtn');
      const result = document.getElementById('result');
      const adminKey = adminKeyInput.value.trim();
      const title = document.getElementById('title').value.trim();
      const body = document.getElementById('body').value.trim();
      const url = document.getElementById('url').value.trim() || '/';

      if (!adminKey || !title) {
        result.className = 'err';
        result.textContent = '請填寫管理金鑰與標題';
        return;
      }

      localStorage.setItem('pushAdminKey', adminKey);
      btn.disabled = true;
      btn.textContent = '發送中…';
      result.style.display = 'none';

      try {
        const res = await fetch('/api/push/send', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-Admin-Key': adminKey },
          body: JSON.stringify({ title, body, url }),
        });
        const data = await res.json();
        if (res.ok) {
          result.className = 'ok';
          result.textContent = `發送完成：成功 ${data.sent} 筆，失效已清除 ${data.removed} 筆，失敗 ${data.failed} 筆`;
        } else {
          result.className = 'err';
          result.textContent = '發送失敗：' + (data.error || res.status);
        }
      } catch (e) {
        result.className = 'err';
        result.textContent = '發送失敗：' + e.message;
      } finally {
        btn.disabled = false;
        btn.textContent = '發送推播通知';
      }
    });
  </script>
</body>
</html>
