name: 部署到 Cloudflare Workers

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: 部署
    steps:
      - uses: actions/checkout@v4
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: 推送 IndexNow（通知搜尋引擎內容已更新）
        run: |
          urls=$(grep -o '<loc>[^<]*</loc>' sitemap.xml | sed -e 's/<loc>//' -e 's#</loc>##')
          json_urls=$(printf '%s\n' "$urls" | python3 -c "import json,sys; print(json.dumps([l.strip() for l in sys.stdin if l.strip()]))")
          curl -s -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "{\"host\":\"lovecat.cc\",\"key\":\"9d987292186a422895a6f7aa98de9039\",\"keyLocation\":\"https://lovecat.cc/9d987292186a422895a6f7aa98de9039.txt\",\"urlList\":$json_urls}"
